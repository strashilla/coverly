<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coverly - Settings</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <div class="container">

        <header>
            <h1><span style="color:#dbfa31;font-family:'Fira Mono','JetBrains Mono',monospace;">Cover</span><span class="accent" style="color:#4DD0E1;font-family:'Fira Mono','JetBrains Mono',monospace;">ly</span></h1>
            <p class="subtitle" style="color:#b2bec3;margin-top:0.5em;">AI cover letters in one click — set up your resume once</p>
        </header>

        <div id="welcomeBanner" style="background:#DBFA31;color:#0A0A0A;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;font-weight:500;display:none;text-align:center">
          👋 Добро пожаловать в Coverly! Вставь своё резюме один раз — и получай письма за один клик на любой вакансии.
        </div>

        <main>
            <div class="section">
                <h2>Your Resume</h2>
                <p class="description">Enter your resume once - it will be saved and used for all applications.</p>
                <textarea id="resume" placeholder="Paste your resume here..."></textarea>
                <button id="saveBtn" class="btn-primary">Save Resume</button>
            </div>

            <div id="message" class="message hidden"></div>
        </main>
    </div>
    <script src="settings.js"></script>
</body>
</html>
